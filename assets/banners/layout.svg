<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="layoutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7ec0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="#0a1628" rx="0"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="216" height="216" fill="none" stroke="url(#layoutGradient)" stroke-width="8" rx="12"/>

  <!-- Left sidebar -->
  <rect x="30" y="30" width="50" height="196" fill="url(#layoutGradient)" opacity="0.3" rx="6"/>

  <!-- Top bar -->
  <rect x="90" y="30" width="146" height="40" fill="url(#layoutGradient)" opacity="0.5" rx="6"/>

  <!-- Content grid - left column -->
  <rect x="90" y="80" width="66" height="60" fill="url(#layoutGradient)" opacity="0.4" rx="4"/>
  <rect x="90" y="150" width="66" height="76" fill="url(#layoutGradient)" opacity="0.3" rx="4"/>

  <!-- Content grid - right column -->
  <rect x="166" y="80" width="70" height="60" fill="url(#layoutGradient)" opacity="0.4" rx="4"/>
  <rect x="166" y="150" width="70" height="76" fill="url(#layoutGradient)" opacity="0.3" rx="4"/>
</svg>