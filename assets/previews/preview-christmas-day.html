<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Christmas Day - Snow Studio Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a0e;
      color: #e8e8d0;
      padding: 40px;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #ff6b35;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }

    .color-box {
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    button {
      background: #ff6b35;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin: 5px;
    }

    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0.6;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>❄️ Christmas Day</h1>
    <p>Festive theme with warm reds, golds, and greens</p>
    <div class="color-grid">
      <div class="color-box" style="background: #ff6b35;"><strong>#ff6b35</strong></div>
      <div class="color-box" style="background: #c41e3a;"><strong>#c41e3a</strong></div>
      <div class="color-box" style="background: #e8e8d0; color: #1a1a0e;"><strong>#e8e8d0</strong></div>
    </div>
    <button>Sample Button</button>
    <button style="background: #c41e3a;">Secondary</button>
    <div class="footer">Generated by Snow Studio</div>
  </div>
</body>

</html>
