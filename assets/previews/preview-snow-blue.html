<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snow Blue - Snow Studio Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b1220;
      color: #e0e0e0;
      padding: 40px;
      min-height: 100vh;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 32px; margin-bottom: 10px; color: #4da6ff; }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }
    .color-box {
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    button {
      background: #4da6ff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin: 5px;
    }
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0.6;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>❄️ Snow Blue</h1>
    <p>Modern, cool-toned theme with soft blues and whites</p>
    <div class="color-grid">
      <div class="color-box" style="background: #4da6ff;"><strong>#4da6ff</strong></div>
      <div class="color-box" style="background: #22c55e;"><strong>#22c55e</strong></div>
      <div class="color-box" style="background: #e0e0e0; color: #0b1220;"><strong>#e0e0e0</strong></div>
    </div>
    <button>Sample Button</button>
    <button style="background: #22c55e;">Secondary</button>
    <div class="footer">Generated by Snow Studio</div>
  </div>
</body>
</html>
