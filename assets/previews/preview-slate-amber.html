<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slate Amber Night - Snow Studio Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1e2e;
      color: #c8c7c6;
      padding: 40px;
      min-height: 100vh;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 32px; margin-bottom: 10px; color: #ffa500; }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }
    .color-box {
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    button {
      background: #ffa500;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin: 5px;
    }
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0.6;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>❄️ Slate Amber Night</h1>
    <p>Professional dark theme with amber highlights and slate backgrounds</p>
    <div class="color-grid">
      <div class="color-box" style="background: #ffa500;"><strong>#ffa500</strong></div>
      <div class="color-box" style="background: #cc8844;"><strong>#cc8844</strong></div>
      <div class="color-box" style="background: #c8c7c6; color: #1a1e2e;"><strong>#c8c7c6</strong></div>
    </div>
    <button>Sample Button</button>
    <button style="background: #cc8844;">Secondary</button>
    <div class="footer">Generated by Snow Studio</div>
  </div>
</body>
</html>
