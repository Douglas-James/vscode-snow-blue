name: VSCode Snow-Blue Extension

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f images/icon.png

      - name: Compile extension
        run: npm run compile

      - name: Generate preview HTML (multi-theme)
        run: node scripts/build-previews.js

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take screenshots
        run: node scripts/screenshot.js

      - name: Upload preview images (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: preview-images
          path: images/*.png

  bump-version:
    if: github.event_name == 'release'
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install dependencies
        run: npm install

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version

      - name: Commit version bump
        run: |
          git add package.json package-lock.json || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump version ${{ github.ref_name }}"
          git push origin main

  publish:
    if: github.event_name == 'release'
    needs: bump-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package

      - name: Publish to VS Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          test -n "$VSCE_PAT" || (echo "Missing VSCE_PAT secret" && exit 1)
          vsce publish -p "$VSCE_PAT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: snow-blue-extension
          path: "*.vsix"
